<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciamento de Alunos</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <main class="container">
    <header class="cabecalho">
      <h1>Gerenciamento de Alunos</h1>
      <p class="subtitulo">Cadastre, edite e gerencie os alunos do sistema</p>
    </header>

    <!-- Formulário de Cadastro/Edição -->
    <section class="card">
      <h2 th:text="${aluno != null} ? 'Editar Aluno' : 'Cadastrar Aluno'">Cadastrar Aluno</h2>
      <form th:action="@{/salvar}" method="post">
        <input type="hidden" th:value="${aluno?.id}" name="id">

        <div class="form-grid">
          <div class="campo">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" name="nome" placeholder="Digite o nome" th:value="${aluno?.nome}" required>
          </div>

          <div class="campo">
            <label for="matricula">Matrícula</label>
            <input type="text" id="matricula" name="matricula" placeholder="Ex: 2024001" th:value="${aluno?.matricula}" required>
          </div>

          <div class="campo">
            <label for="curso">Curso</label>
            <input type="text" id="curso" name="curso" placeholder="Ex: Ciência da Computação" th:value="${aluno?.curso}" required>
          </div>

          <div class="campo">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="Ex: aluno@email.com" th:value="${aluno?.email}" required>
          </div>

          <div class="campo">
            <label for="status">Status</label>
            <select id="status" name="status" required>
              <option value="Ativo" th:selected="${aluno?.status == 'Ativo'}">Ativo</option>
              <option value="Inativo" th:selected="${aluno?.status == 'Inativo'}">Inativo</option>
            </select>
          </div>
        </div>

        <div class="botoes">
          <button type="submit" class="btn btn-salvar" th:text="${aluno != null} ? 'Atualizar' : 'Salvar'">Salvar</button>
          <a href="/" class="btn btn-cancelar">Cancelar</a>
        </div>
      </form>
    </section>

    <!-- Tabela de Alunos -->
    <section class="card">
      <h2>Alunos Cadastrados</h2>
      <div class="tabela-container">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Matrícula</th>
              <th>Curso</th>
              <th>E-mail</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="aluno : ${alunos}">
              <td th:text="${aluno.nome}">Nome</td>
              <td th:text="${aluno.matricula}">Matrícula</td>
              <td th:text="${aluno.curso}">Curso</td>
              <td th:text="${aluno.email}">Email</td>
              <td th:text="${aluno.status}">Status</td>
              <td>
                <a th:href="@{/editar/{id}(id=${aluno.id})}" class="btn-editar">Editar</a>
                <a th:href="@{/excluir/{id}(id=${aluno.id})}" class="btn-excluir" onclick="return confirm('Tem certeza que deseja excluir este aluno?')">Excluir</a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="rodape">
    <p>Desenvolvido por Carlos Henrique Martins &middot; <a href="https://github.com/solrac-henrique" target="_blank">GitHub</a></p>
  </footer>

</body>
</html>
